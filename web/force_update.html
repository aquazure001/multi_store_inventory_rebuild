<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>アプリ更新中</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff7ff;
      color: #1f1b24;
    }
    .box {
      width: min(88vw, 420px);
      padding: 28px 22px;
      border-radius: 20px;
      background: white;
      box-shadow: 0 8px 28px rgba(0,0,0,.12);
      text-align: center;
    }
    .spinner {
      width: 42px;
      height: 42px;
      margin: 0 auto 16px;
      border: 5px solid #d7e9ff;
      border-top-color: #1e88e5;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 22px; margin: 0 0 10px; }
    p { font-size: 15px; line-height: 1.7; margin: 0; color: #555; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h1>最新の更新を反映中</h1>
    <p>キャッシュを削除して、アプリを読み直しています。<br>この画面のまま少しお待ちください。</p>
  </div>
  <script>
    (function() {
      var stamp = Date.now();
      var done = false;
      function goHome() {
        if (done) return;
        done = true;
        var url = '/?force_update=' + stamp + '&build=20260723_205445';
        window.location.replace(url);
      }
      function clearStorage() {
        try { localStorage.setItem('inventory_last_force_update', String(stamp)); } catch (e) {}
        try { sessionStorage.setItem('inventory_last_force_update', String(stamp)); } catch (e) {}
      }
      var jobs = [];
      clearStorage();
      if ('serviceWorker' in navigator) {
        jobs.push(
          navigator.serviceWorker.getRegistrations()
            .then(function(registrations) {
              return Promise.all(registrations.map(function(reg) { return reg.unregister(); }));
            })
            .catch(function() {})
        );
      }
      if ('caches' in window) {
        jobs.push(
          caches.keys()
            .then(function(keys) {
              return Promise.all(keys.map(function(key) { return caches.delete(key); }));
            })
            .catch(function() {})
        );
      }
      Promise.all(jobs).then(function() {
        setTimeout(goHome, 350);
      }).catch(function() {
        setTimeout(goHome, 350);
      });
      setTimeout(goHome, 3500);
    })();
  </script>
</body>
</html>
