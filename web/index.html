  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <meta name="theme-color" content="#1E88E5">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="在庫管理">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>多店舗在庫管理システム</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    if ('serviceWorker' in navigator) {
      let newWorkerWaiting = null;
      let reloading = false;

      function activateWaiting(worker) {
        newWorkerWaiting = worker;
        worker.postMessage('skip-waiting');
      }

      navigator.serviceWorker.ready.then(function(registration) {
        // 起動時点でもう待機中のSWがあれば即座に切り替え（閉じて開くだけで更新）
        if (registration.waiting) {
          activateWaiting(registration.waiting);
        }

        registration.addEventListener('updatefound', function() {
          var newWorker = registration.installing;
          newWorker.addEventListener('statechange', function() {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              newWorkerWaiting = newWorker;
              window.dispatchEvent(new CustomEvent('swUpdateReady'));
            }
          });
        });
      });

      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if (!reloading) {
          reloading = true;
          window.location.reload();
        }
      });

      window.applyUpdate = function() {
        if (newWorkerWaiting) {
          newWorkerWaiting.postMessage('skip-waiting');
        } else {
          window.location.reload();
        }
      };
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
